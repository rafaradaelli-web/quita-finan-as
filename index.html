<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quita — O Duolingo das Finanças</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:#F2F0F8}
#root{max-width:430px;margin:0 auto;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.quita-card{animation:fadeIn 0.25s ease}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const LESSONS = [
  {
    id: 1, title: "Raio-X da dívida", subtitle: "Mapeie todas as suas dívidas", xp: 30, theme: "divida",
    content: "Você sabe exatamente quanto deve? A maioria dos brasileiros não sabe. O primeiro passo pra sair das dívidas não é pagar nada — é anotar tudo. Cada dívida: pra quem deve, quanto, qual o juros, e a parcela mínima.",
    highlight: { number: "80,2% das famílias", label: "têm alguma dívida. Você não está sozinho." },
    questions: [
      { q: "Qual é o primeiro passo pra sair das dívidas?", opts: ["Cortar o cartão", "Anotar todas as dívidas", "Pegar empréstimo"], correct: 1, explain: "Antes de qualquer ação, saiba o tamanho do problema." },
      { q: "O que anotar sobre cada dívida?", opts: ["Só o valor total", "Credor, valor, juros e parcela", "Só o nome do banco"], correct: 1, explain: "Cada detalhe importa. O juros define a urgência." },
      { q: "Qual % de famílias tem dívida?", opts: ["Cerca de 50%", "Cerca de 65%", "Mais de 80%"], correct: 2, explain: "80,2%! Você não está sozinho nessa." },
    ]
  },
  {
    id: 2, title: "Juros compostos", subtitle: "O inimigo silencioso", xp: 30, theme: "divida",
    content: "R$ 1.000 no cartão a 15%/mês. Se não pagar, no mês seguinte são R$ 1.150. Depois R$ 1.322. Em 12 meses: R$ 5.350. Juros sobre juros — sua dívida acelera. Pagar só o mínimo é armadilha.",
    highlight: { number: "R$ 1.000 → R$ 5.350", label: "em 12 meses com juros de cartão." },
    questions: [
      { q: "O que são juros compostos?", opts: ["Juros fixos", "Juros sobre o valor original", "Juros sobre juros"], correct: 2, explain: "Juros sobre o valor atualizado — por isso acelera." },
      { q: "R$ 1.000 a 15%/mês vira quanto em 1 ano?", opts: ["R$ 2.800", "R$ 5.350", "R$ 1.500"], correct: 1, explain: "Multiplica por 5x em 12 meses!" },
      { q: "Por que o mínimo do cartão é perigoso?", opts: ["Banco cancela", "Juros crescem no saldo", "Perde pontos"], correct: 1, explain: "O restante rende juros compostos todo mês." },
    ]
  },
  {
    id: 3, title: "Método bola de neve", subtitle: "Quite dívidas mais rápido", xp: 30, theme: "divida",
    content: "3 dívidas: R$ 300, R$ 1.200 e R$ 4.000. Pague o mínimo em todas e jogue tudo extra na menor. Quando quitar, use o valor livre pra próxima. Vitórias rápidas = motivação.",
    highlight: { number: "3 dívidas → 0", label: "Pague a menor primeiro, use o valor pra próxima." },
    questions: [
      { q: "No bola de neve, qual pagar primeiro?", opts: ["Maior valor", "Menor valor", "Mais antiga"], correct: 1, explain: "Menor = quitada rápido = motivação!" },
      { q: "Quitou a de R$ 300. E agora?", opts: ["Guardar na poupança", "Comemorar gastando", "Somar na próxima dívida"], correct: 2, explain: "Soma ao pagamento da próxima. A bola cresce." },
      { q: "Por que bola de neve > avalanche?", opts: ["Economiza mais juros", "Vitórias rápidas motivam", "Bancos dão desconto"], correct: 1, explain: "Matematicamente o avalanche é melhor, mas a maioria desiste." },
    ]
  },
  {
    id: 4, title: "Pra onde vai seu dinheiro", subtitle: "Encontre gastos invisíveis", xp: 30, theme: "gastos",
    content: "R$ 15 no café, R$ 25 no delivery, R$ 12 no app. Parecem nada, somam R$ 500+/mês. Anote tudo por 1 semana e descubra pelo menos R$ 200/mês em gastos que nem sabia.",
    highlight: { number: "R$ 200+/mês", label: "em gastos invisíveis que a maioria descobre." },
    questions: [
      { q: "Melhor forma de saber pra onde vai o dinheiro?", opts: ["Extrato no fim do mês", "Anotar cada gasto por 1 semana", "Lembrar de cabeça"], correct: 1, explain: "Anotar em tempo real é muito mais preciso." },
      { q: "Por que gastos pequenos são perigosos?", opts: ["Banco cobra taxa", "Somam muito no mês", "São desnecessários"], correct: 1, explain: "R$ 15 aqui, R$ 25 ali = R$ 500+/mês." },
      { q: "Quanto se descobre em gastos invisíveis?", opts: ["Menos de R$ 50", "Mais de R$ 200", "Nada"], correct: 1, explain: "R$ 200+ por mês! Dinheiro que pode ir pra meta." },
    ]
  },
  {
    id: 5, title: "A regra 50-30-20", subtitle: "A regra de ouro", xp: 30, theme: "gastos",
    content: "50% necessidades (aluguel, luz, mercado). 30% desejos (delivery, streaming). 20% futuro (dívidas, reserva). Ganha R$ 3.000? = R$ 1.500 + R$ 900 + R$ 600. Não consegue 20%? Comece com 5%.",
    highlight: { number: "50 | 30 | 20", label: "Necessidades | Desejos | Futuro" },
    questions: [
      { q: "Na regra 50-30-20, necessidades =", opts: ["20%", "30%", "50%"], correct: 2, explain: "Metade da renda vai pra essenciais." },
      { q: "Delivery e streaming são:", opts: ["Necessidades (50%)", "Desejos (30%)", "Futuro (20%)"], correct: 1, explain: "Coisas que quer, mas poderia viver sem." },
      { q: "Não consigo 20%. O que fazer?", opts: ["Desistir", "Começar com 5% ou 10%", "Esperar ganhar mais"], correct: 1, explain: "Qualquer valor > zero. O hábito importa mais." },
    ]
  },
];

const CATEGORIES = ["Alimentação", "Transporte", "Moradia", "Lazer", "Saúde", "Educação", "Delivery", "Assinaturas", "Impostos", "Trabalho", "Cartão de Crédito", "Investimentos", "Transferências", "Outros"];

const initState = () => {
  try { const s = localStorage.getItem("quita"); if (s) return JSON.parse(s); } catch(e) {}
  return {
    xp: 0, streak: 0, lastActiveDate: null, level: 1,
    completedLessons: [], currentLesson: 0,
    expenses: [], goals: [{ id: 1, name: "Quitar cartão", target: 2000, saved: 0, createdAt: Date.now() }],
    debts: [{ id: 1, name: "Cartão Nubank", total: 2000, paid: 0, rate: 15 }],
    achievements: [], weeklyXp: 0, league: "Bronze",
    profileCompletion: 25, income: 0,
  };
};

const LEVELS = [
  { name: "Perdido", xp: 0 }, { name: "Curioso", xp: 200 }, { name: "Consciente", xp: 600 },
  { name: "Focado", xp: 1200 }, { name: "Organizado", xp: 2500 }, { name: "Estratégico", xp: 5000 },
  { name: "Livre", xp: 10000 }, { name: "Mestre", xp: 20000 },
];

const getLevel = (xp) => {
  let lvl = 0;
  for (let i = LEVELS.length - 1; i >= 0; i--) { if (xp >= LEVELS[i].xp) { lvl = i; break; } }
  return lvl;
};

const calcProfile = (s) => {
  let p = 0;
  if (s.income > 0) p += 15;
  if (s.debts.length > 0) p += 15;
  if (s.goals.length > 0) p += 10;
  const recent7 = s.expenses.filter(e => Date.now() - e.date < 7 * 86400000).length;
  p += Math.min(20, recent7 * 4);
  const recent30 = s.expenses.filter(e => Date.now() - e.date < 30 * 86400000).length;
  p += Math.min(25, recent30 * 2.5);
  const cats = new Set(s.expenses.map(e => e.category)).size;
  p += Math.min(15, cats * 5);
  return Math.min(100, Math.round(p));
};

function QuitaApp() {
  const [state, setState] = useState(initState);
  const [screen, setScreen] = useState("home");
  const [lessonStep, setLessonStep] = useState("content");
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(-1);
  const [answered, setAnswered] = useState(false);
  const [lives, setLives] = useState(3);
  const [lessonXp, setLessonXp] = useState(0);
  const [showExpenseForm, setShowExpenseForm] = useState(false);
  const [showGoalForm, setShowGoalForm] = useState(false);
  const [toast, setToast] = useState(null);
  const [expName, setExpName] = useState("");
  const [expAmount, setExpAmount] = useState("");
  const [expCat, setExpCat] = useState("Alimentação");
  const [goalName, setGoalName] = useState("");
  const [goalTarget, setGoalTarget] = useState("");
  const [incomeInput, setIncomeInput] = useState("");
  const [showIncomeForm, setShowIncomeForm] = useState(false);
  const [excelPreview, setExcelPreview] = useState(null);
  const [excelMapping, setExcelMapping] = useState({ name: "", amount: "", category: "", date: "" });
  const [importStep, setImportStep] = useState(null);
  const [pdfParsing, setPdfParsing] = useState(false);
  const [pdfPreview, setPdfPreview] = useState(null);
  const [catFilters, setCatFilters] = useState([]);
  const [monthFilter, setMonthFilter] = useState("all");
  const [customRange, setCustomRange] = useState({ start: "", end: "" });
  const [showCustomRange, setShowCustomRange] = useState(false);
  const [detailFaturaId, setDetailFaturaId] = useState(null);

  const save = useCallback((s) => { try { localStorage.setItem("quita", JSON.stringify(s)); } catch(e) {} }, []);

  const addXp = useCallback((amount, msg) => {
    setState(prev => {
      const n = { ...prev, xp: prev.xp + amount, weeklyXp: prev.weeklyXp + amount };
      n.level = getLevel(n.xp);
      n.profileCompletion = calcProfile(n);
      save(n);
      return n;
    });
    if (msg) { setToast("+" + amount + " XP — " + msg); setTimeout(() => setToast(null), 2500); }
  }, [save]);

  const checkStreak = useCallback(() => {
    const today = new Date().toDateString();
    setState(prev => {
      if (prev.lastActiveDate === today) return prev;
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      const n = { ...prev, lastActiveDate: today };
      if (prev.lastActiveDate === yesterday) { n.streak = prev.streak + 1; }
      else if (prev.lastActiveDate !== today) { n.streak = 1; }
      n.profileCompletion = calcProfile(n);
      save(n);
      return n;
    });
  }, [save]);

  useEffect(() => { checkStreak(); }, [checkStreak]);

  const startLesson = (idx) => {
    setScreen("lesson"); setLessonStep("content"); setQIdx(0);
    setSelected(-1); setAnswered(false); setLives(3); setLessonXp(0);
    setState(p => ({ ...p, currentLesson: idx }));
  };

  const nextQuestion = () => {
    const lesson = LESSONS[state.currentLesson];
    if (qIdx < lesson.questions.length - 1) {
      setQIdx(q => q + 1); setSelected(-1); setAnswered(false);
    } else {
      const perfect = lessonXp === 30;
      const bonus = perfect ? 20 : 0;
      const totalXp = lessonXp + bonus;
      addXp(totalXp, perfect ? "Lição perfeita!" : "Lição completa!");
      addXp(15, "Streak mantido");
      setState(p => {
        const cl = [...p.completedLessons];
        if (!cl.includes(lesson.id)) cl.push(lesson.id);
        const n = { ...p, completedLessons: cl };
        save(n);
        return n;
      });
      setLessonStep("done");
    }
  };

  const checkAnswer = () => {
    const lesson = LESSONS[state.currentLesson];
    const q = lesson.questions[qIdx];
    setAnswered(true);
    if (selected === q.correct) { setLessonXp(x => x + 10); } else { setLives(l => l - 1); }
  };

  const addExpense = () => {
    if (!expName || !expAmount) return;
    const amt = parseFloat(expAmount);
    if (isNaN(amt) || amt <= 0) return;
    setState(prev => {
      const n = { ...prev, expenses: [...prev.expenses, { id: Date.now(), name: expName, amount: amt, category: expCat, date: Date.now() }] };
      n.profileCompletion = calcProfile(n);
      save(n);
      return n;
    });
    addXp(5, "Gasto registrado");
    checkStreak();
    setExpName(""); setExpAmount(""); setShowExpenseForm(false);
  };

  const updateExpenseCategory = (expId, newCat) => {
    setState(prev => {
      const exp = prev.expenses.find(e => e.id === expId);
      if (!exp || exp.category === newCat) return prev;
      const n = { ...prev, expenses: prev.expenses.map(e => e.id === expId ? { ...e, category: newCat } : e) };
      n.profileCompletion = calcProfile(n);
      save(n);
      return n;
    });
    addXp(2, "Categoria atualizada");
  };

  const deleteExpense = (expId) => {
    setState(prev => {
      const n = { ...prev, expenses: prev.expenses.filter(e => e.id !== expId) };
      n.profileCompletion = calcProfile(n);
      save(n);
      return n;
    });
  };

  const handleDetailFatura = async (faturaId, e) => {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    setDetailFaturaId(faturaId);
    setPdfParsing(true); setImportStep("pdf-loading");
    try {
      let content, isPdf = false;
      if (file.name.match(/\.pdf$/i)) {
        isPdf = true;
        content = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = () => rej(); r.readAsDataURL(file); });
      } else {
        const buf = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = () => rej(); r.readAsArrayBuffer(file); });
        const wb = XLSX.read(buf, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        content = raw.map(row => row.filter(c => String(c).trim()).join(" | ")).filter(l => l.trim().length > 3).slice(0, 200).join("\n");
      }
      const prompt2 = 'Esta é uma FATURA DE CARTÃO DE CRÉDITO. Extraia TODOS os gastos/compras individuais.\n\nResponda APENAS com JSON válido:\n{"expenses":[{"name":"descrição","amount":99.90,"category":"Categoria","date":"2026-01-15"}]}\n\nCategorias: Alimentação, Transporte, Moradia, Lazer, Saúde, Educação, Delivery, Assinaturas, Impostos, Trabalho, Outros\n- amount SEMPRE positivo\n- date formato YYYY-MM-DD\n- Ignore juros, multas, encargos, pagamentos anteriores\n- Se não encontrar: {"expenses":[]}';
      const messages = isPdf
        ? [{ role: "user", content: [{ type: "document", source: { type: "base64", media_type: "application/pdf", data: content } }, { type: "text", text: prompt2 }] }]
        : [{ role: "user", content: prompt2 + "\n\nDados:\n" + content }];
      const response = await fetch("/api/claude", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, messages })
      });
      const data = await response.json();
      if (data.error) { setToast("Erro: " + (data.error.message || "")); setTimeout(() => setToast(null), 3000); setImportStep(null); setPdfParsing(false); setDetailFaturaId(null); return; }
      const text = data.content?.map(c => c.text || "").join("") || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      if (parsed.expenses && parsed.expenses.length > 0) {
        // Remove the original fatura expense and add detailed ones
        setState(prev => {
          const n = { ...prev, expenses: prev.expenses.filter(e => e.id !== faturaId) };
          parsed.expenses.forEach((exp, i) => {
            n.expenses.push({ id: Date.now() + i, name: exp.name, amount: Math.abs(parseFloat(exp.amount)) || 0, category: CATEGORIES.includes(exp.category) ? exp.category : "Outros", date: exp.date ? new Date(exp.date).getTime() || Date.now() : Date.now() });
          });
          n.profileCompletion = calcProfile(n);
          save(n);
          return n;
        });
        addXp(Math.min(parsed.expenses.length * 5, 100), parsed.expenses.length + " itens da fatura detalhados!");
        setImportStep(null);
      } else { setToast("Nenhum gasto na fatura"); setTimeout(() => setToast(null), 2500); setImportStep(null); }
    } catch (err) { console.error(err); setToast("Erro ao processar fatura"); setTimeout(() => setToast(null), 2500); setImportStep(null); }
    setPdfParsing(false); setDetailFaturaId(null);
  };


  const sendToAI = async (content, isPdf) => {
    setPdfParsing(true); setImportStep("pdf-loading");
    try {
      const prompt = 'Analise este extrato/fatura e extraia APENAS os GASTOS (valores negativos, débitos, pagamentos, compras, boletos, pix enviados).\n\nIGNORE: saldos diários, transferências recebidas, créditos, investimentos recebidos, equilíbrio entre contas, IOF, transferências enviadas para si mesmo (mesmo nome do titular).\n\nIMPORTANTE sobre fatura de cartão: se aparecer "Pagamento de fatura do cartão", categorize como "Cartão de Crédito" e mantenha o valor. O usuário vai detalhar depois.\n\nCategorize INTELIGENTEMENTE:\n- Alimentação: supermercado, restaurante, padaria, açougue, mercado\n- Delivery: iFood, Rappi, Uber Eats, apps de entrega\n- Transporte: Uber, 99, combustível, estacionamento, pedágio\n- Moradia: aluguel, condomínio, energia (Copel/Enel/CPFL), água, gás, IPTU\n- Assinaturas: Netflix, Spotify, streaming, software mensal\n- Saúde: farmácia, médico, plano de saúde, academia\n- Educação: escola, curso, livros, mensalidade\n- Lazer: cinema, viagem, entretenimento, roupas, compras pessoais\n- Impostos: DAS, DARF, Simples Nacional, IPVA, IR, taxas governamentais, Fundo Reequipamento\n- Trabalho: contabilidade, ferramentas de trabalho, coworking, PJBank, serviços profissionais\n- Cartão de Crédito: pagamento de fatura do cartão\n- Transferências: Pix enviado para pessoas (não empresas)\n- Investimentos: aportes, aplicações\n- Outros: o que não se encaixar em nenhuma\n\nResponda APENAS com JSON válido, sem markdown, sem backticks, sem texto:\n{"expenses":[{"name":"descrição limpa e curta","amount":99.90,"category":"Categoria","date":"2026-01-15"}]}\n\n- amount SEMPRE positivo (sem sinal negativo)\n- date no formato YYYY-MM-DD\n- name deve ser limpo e legível (ex: "Copel" não "Pagamento de boleto Copel")\n- Se não encontrar gastos: {"expenses":[]}';
      const messages = isPdf
        ? [{ role: "user", content: [{ type: "document", source: { type: "base64", media_type: "application/pdf", data: content } }, { type: "text", text: prompt }] }]
        : [{ role: "user", content: prompt + "\n\nDados:\n" + content }];
      const response = await fetch("/api/claude", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, messages })
      });
      const data = await response.json();
      if (data.error) { setToast("Erro: " + (data.error.message || "tente novamente")); setTimeout(() => setToast(null), 3000); setImportStep(null); setPdfParsing(false); return; }
      const text = data.content?.map(c => c.text || "").join("") || "";
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (parsed.expenses && parsed.expenses.length > 0) {
        setPdfPreview(parsed.expenses.map((exp, i) => ({ ...exp, id: Date.now() + i, amount: Math.abs(parseFloat(exp.amount)) || 0, selected: true })));
        setImportStep("pdf-preview");
      } else { setToast("Nenhum gasto encontrado"); setTimeout(() => setToast(null), 2500); setImportStep(null); }
    } catch (err) { console.error(err); setToast("Erro ao processar. Verifique conexão."); setTimeout(() => setToast(null), 3000); setImportStep(null); }
    setPdfParsing(false);
  };

  const handleExcelUpload = (e) => {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(evt.target.result, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        if (raw.length < 2) { setToast("Planilha vazia"); setTimeout(() => setToast(null), 2500); return; }
        const textLines = raw.map(row => row.filter(c => String(c).trim()).join(" | ")).filter(l => l.trim().length > 3);
        sendToAI(textLines.slice(0, 200).join("\n"), false);
      } catch (err) { setToast("Erro ao ler arquivo"); setTimeout(() => setToast(null), 2500); }
    };
    reader.readAsArrayBuffer(file);
  };

  const handlePdfUpload = async (e) => {
    const file = e.target.files[0]; if (!file) return; e.target.value = "";
    try {
      const base64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.onerror = () => rej(); r.readAsDataURL(file); });
      sendToAI(base64, true);
    } catch (err) { setToast("Erro ao ler PDF"); setTimeout(() => setToast(null), 2500); }
  };

  const togglePdfItem = (idx) => { setPdfPreview(prev => prev.map((item, i) => i === idx ? { ...item, selected: !item.selected } : item)); };
  const updatePdfItemCategory = (idx, cat) => { setPdfPreview(prev => prev.map((item, i) => i === idx ? { ...item, category: cat } : item)); };

  const confirmPdfImport = () => {
    if (!pdfPreview) return;
    const sel = pdfPreview.filter(e => e.selected && e.amount > 0);
    if (sel.length === 0) { setToast("Selecione pelo menos 1 gasto"); setTimeout(() => setToast(null), 2500); return; }
    const ne = sel.map((e, i) => ({ id: Date.now() + i, name: e.name, amount: e.amount, category: CATEGORIES.includes(e.category) ? e.category : "Outros", date: e.date ? new Date(e.date).getTime() || Date.now() : Date.now() }));
    setState(prev => { const n = { ...prev, expenses: [...prev.expenses, ...ne] }; n.profileCompletion = calcProfile(n); save(n); return n; });
    addXp(Math.min(sel.length * 5, 50), sel.length + " gastos importados!");
    checkStreak();
    setPdfPreview(null); setImportStep(null);
  };

  const addGoal = () => {
    if (!goalName || !goalTarget) return;

        <div style={{fontSize:11,color:"#9B8EBE",fontWeight:700,marginBottom:8,marginTop:16,letterSpacing:1}}>CONQUISTAS</div>
        <div style={card}>{[{name:"Primeira lição",done:state.completedLessons.length>=1,icon:"📖"},{name:"Semana perfeita",done:state.streak>=7,icon:"🔥"},{name:"Detetive de gastos",done:state.expenses.length>=50,icon:"🔍"},{name:"Mês de ferro",done:state.streak>=30,icon:"💪"},{name:"Bola de neve",done:state.debts.some(d=>d.paid>=d.total),icon:"⛄"}].map((a,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<4?"1px solid #F5F5F5":"none",opacity:a.done?1:0.35}}><div style={{width:40,height:40,borderRadius:12,background:a.done?"linear-gradient(135deg,#EDE9FE,#DDD6FE)":"#F5F5F5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{a.done?a.icon:"🔒"}</div><span style={{fontSize:14,color:a.done?"#333":"#BBB",fontWeight:a.done?600:400,flex:1}}>{a.name}</span>{a.done&&<span style={{...pillGreen}}>✓</span>}</div>)}</div>
        <button style={{...btnOut,marginTop:16,color:"#EF4444",borderColor:"#EF4444",boxShadow:"none"}} onClick={()=>{localStorage.removeItem("quita");setState(initState());setScreen("home");}}>Resetar dados (dev)</button>
      </div>
      <div style={{height:20}}/><NavBar/>
    </div>
  );

  return (
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif",maxWidth:430,margin:"0 auto",position:"relative",background:"#F2F0F8",minHeight:"100vh"}}>
      <Toast/>
      {screen==="home"&&<Home/>}
      {screen==="lesson"&&<Lesson/>}
      {screen==="expenses"&&<Expenses/>}
      {screen==="goals"&&<Goals/>}
      {screen==="profile"&&<Profile/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(QuitaApp));
</script>
</body>
</html>
